name: Minecraft Bot 24/7

on:
  push:
    branches: [ main ]
  workflow_dispatch: # الاعتماد الكلي على التشغيل الذاتي واليدوي لمنع التداخل

permissions:
  actions: write
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Force Cancel All Previous Runs
      # استخدام أداة GitHub الرسمية لقتل أي ووركفلاو قديم يعمل حالياً فوراً لمنع التضاعف
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "جاري فحص وإغلاق أي مهمة قديمة تعمل حالياً لضمان بقاء بوت واحد..."
        active_runs=$(gh run list --workflow=main.yml --status=in_progress --json databaseId --jq '.[].databaseId')
        for run_id in $active_runs; do
          if [ "$run_id" != "$GITHUB_RUN_ID" ]; then
            echo "إغلاق المهمة القديمة ذات الرقم: $run_id"
            gh run cancel $run_id
          fi
        done

    - name: Start Minecraft Bot
      # تثبيت الوقت على 230 دقيقة (أقل من 4 ساعات بقليل) كأمان تام قبل تدوير اللوب
      timeout-minutes: 230
      run: npm start
      continue-on-error: true

    - name: Trigger Next Loop (Chain Workflow)
      if: always()
      run: |
        echo "بدء مهمة جديدة وتمرير اللوب..."
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d '{"ref":"main"}'
