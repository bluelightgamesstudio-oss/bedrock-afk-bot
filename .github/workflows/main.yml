name: Minecraft Bot 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # عامل أمان إضافي يعمل كل 4 ساعات في حال انقطاع اللوب لأي سبب طارئ
    - cron: '0 */4 * * *'
  workflow_dispatch: # يسمح بتشغيل اللوب يدوياً لأول مرة

# إعطاء الووركفلاو الصلاحيات الكاملة للكتابة وإدارة الأكشنز برمجياً
permissions:
  actions: write
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Cancel Previous Runs
      # يلغي تشغيل البوت القديم فوراً لمنع التداخل وظهور بوتين في العالم
      uses: styfle/cancel-workflow-action@0.11.0
      with:
        access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Start Minecraft Bot
      # تشغيل البوت لمدة 240 دقيقة (4 ساعات متواصلة) ثم الانتقال للخطوة التالية
      timeout-minutes: 240
      run: npm start
      continue-on-error: true # لضمان استمرار السكربت حتى لو حدث خطأ في اتصال البوت

    - name: Trigger Next Loop (Chain Workflow)
      # هذه الخطوة تستدعي غيتهاب لبدء ووركفلاو جديد فوراً قبل إغلاق الحالي
      if: always()
      run: |
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d '{"ref":"main"}'
