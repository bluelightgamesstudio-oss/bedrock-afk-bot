name: Minecraft Bot 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # يعمل تلقائياً كل 4 ساعات لتفادي الـ 6 ساعات كحد أقصى لـ GitHub
    - cron: '0 */4 * * *'
  workflow_dispatch: # يتيح لك تشغيله يدوياً أيضاً

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Cancel Previous Runs
      # يقوم هذا الأكشن بإلغاء أي ووركفلاو قديم يعمل حالياً لنفس الرابط لمنع التداخل
      uses: styfle/cancel-workflow-action@0.11.0
      with:
        access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Start Minecraft Bot
      # تشغيل البوت، وسيستمر في العمل حتى تنتهي الـ 4 ساعات ويتم استبداله بالووركفلاو القادم
      run: npm start
