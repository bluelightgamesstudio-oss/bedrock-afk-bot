name: Bedrock AFK Bot 24/7

on:
  schedule:
    - cron: '0 */2 * * *' 
  workflow_dispatch:      
  push:
    branches: [ main, master ]

concurrency:
  group: bedrock-afk-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📁 سحب الكود من المستودع
        uses: actions/checkout@v4

      - name: 🟢 تهيئة بيئة Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت المكتبات (Mineflayer + Bedrock)
        run: |
          # نقوم بتثبيت المكتبات المحددة في package.json مباشرة
          npm install

      - name: 🤖 تشغيل بوت الأفروة المضاد للطرد
        timeout-minutes: 340 
        run: node bot.js
